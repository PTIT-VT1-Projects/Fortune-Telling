<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dự đoán lá số tử vi</title>
  <style>
    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      /* Keeps it in the background */
      background-color: transparent;
      /* Optional background color */
    }

    #root {
      z-index: 0;
    }
  </style>
</head>

<body>
  <div id="particles-js"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <!-- <script src="/js/particles.min.js"></script>
    <script src="/js/particles-load.js"></script> -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
  <script>
    VANTA.BIRDS({
      el: "#particles-js", // ID của div nền
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      backgroundColor: 0xfafafa, // Nền trắng xám nhẹ
      color1: 0xe63946,         // Màu đỏ thương hiệu
      color2: 0xffb7b7,         // Màu hồng nhạt
      birdSize: 1.20,
      wingSpan: 15.00,
      speedLimit: 4.00,
      separation: 50.00,
      alignment: 20.00,
      cohesion: 20.00,
      quantity: 3.7,        // Giữ số lượng vừa phải để không đè lên text
      mouseControls: false, // Tắt tương tác chuột
      touchControls: false, // Tắt tương tác chạm
      gyroControls: false,  // Tắt cảm biến xoay (trên mobile)
    })
  </script>
</body>

</html>
